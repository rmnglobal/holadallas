name: Deploy
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
        working-directory: ./holadallas/holadallas-react-source
      - run: npm run build
        working-directory: ./holadallas/holadallas-react-source
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./holadallas/holadallas-react-source/dist
      - id: deployment
        uses: actions/deploy-pages@v5